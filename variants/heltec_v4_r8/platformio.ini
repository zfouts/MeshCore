[Heltec_v4_r8]
extends = esp32_base
board = heltec_v4_r8
build_flags =
  ${esp32_base.build_flags}
  ${sensor_base.build_flags}
  -I variants/heltec_v4_r8
  -D HELTEC_V4_R8
  -D USE_SX1262
  -D ESP32_CPU_FREQ=80
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D P_LORA_DIO_1=14
  -D P_LORA_NSS=8
  -D P_LORA_RESET=12
  -D P_LORA_BUSY=13
  -D P_LORA_SCLK=9
  -D P_LORA_MISO=11
  -D P_LORA_MOSI=10
  -D P_LORA_PA_POWER=7
  -D P_LORA_KCT8103L_PA_CSD=2
  -D P_LORA_KCT8103L_PA_CTX=5
  -D P_LORA_TX_LED=46
  -D PIN_USER_BTN=0
  -D PIN_VEXT_EN=40
  -D PIN_VEXT_EN_ACTIVE=LOW
  -D ADC_MULTIPLIER=5.0715f
  -D PIN_VBAT_READ=1
  -D LORA_TX_POWER=10
  -D MAX_LORA_TX_POWER=22
  -D SX126X_REGISTER_PATCH=1
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
  -D PIN_GPS_RX=38
  -D PIN_GPS_TX=39
  -D PIN_GPS_EN=42
  -D PIN_GPS_EN_ACTIVE=LOW
  -D ENV_INCLUDE_GPS=1
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/heltec_v4_r8>
  +<helpers/sensors>
lib_deps =
  ${esp32_base.lib_deps}
  ${sensor_base.lib_deps}

[heltec_v4_r8_oled]
extends = Heltec_v4_r8
build_flags =
  ${Heltec_v4_r8.build_flags}
  -D HELTEC_V4_R8_OLED
  -D PIN_BOARD_SDA=17
  -D PIN_BOARD_SCL=18
  -D PIN_OLED_RESET=21
build_src_filter = ${Heltec_v4_r8.build_src_filter}
lib_deps = ${Heltec_v4_r8.lib_deps}

[heltec_v4_r8_tft]
extends = Heltec_v4_r8
build_flags =
  ${Heltec_v4_r8.build_flags}
  -D HELTEC_V4_R8_TFT
  -D PIN_BOARD_SDA=17
  -D PIN_BOARD_SCL=18
  -D DISPLAY_SCALE_X=2.5
  -D DISPLAY_SCALE_Y=3.75
  -D PIN_TFT_RST=-1
  -D PIN_TFT_VDD_CTL=-1
  -D PIN_TFT_LEDA_CTL=44
  -D PIN_TFT_LEDA_CTL_ACTIVE=HIGH
  -D PIN_TFT_CS=47
  -D PIN_TFT_DC=48
  -D PIN_TFT_SCL=16
  -D PIN_TFT_SDA=15
  -D PIN_TFT_MISO=45
  -D PIN_BUZZER=4
  -D PIN_TOUCH_RST=21
build_src_filter = ${Heltec_v4_r8.build_src_filter}
  +<helpers/ui/buzzer.cpp>
lib_deps =
  ${Heltec_v4_r8.lib_deps}
  adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
  end2endzone/NonBlockingRTTTL@^1.3.0

[env:heltec_v4_r8_repeater]
extends = heltec_v4_r8_oled
build_flags =
  ${heltec_v4_r8_oled.build_flags}
  -D DISPLAY_CLASS=SSD1306Display
  -D ADVERT_NAME='"Heltec R8 Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
build_src_filter = ${heltec_v4_r8_oled.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<../examples/simple_repeater>
lib_deps =
  ${heltec_v4_r8_oled.lib_deps}
  ${esp32_ota.lib_deps}
  bakercp/CRC32 @ ^2.0.0

[env:heltec_v4_r8_room_server]
extends = heltec_v4_r8_oled
build_flags =
  ${heltec_v4_r8_oled.build_flags}
  -D DISPLAY_CLASS=SSD1306Display
  -D ADVERT_NAME='"Heltec R8 Room"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D ROOM_PASSWORD='"hello"'
build_src_filter = ${heltec_v4_r8_oled.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<../examples/simple_room_server>
lib_deps =
  ${heltec_v4_r8_oled.lib_deps}
  ${esp32_ota.lib_deps}

[env:heltec_v4_r8_terminal_chat]
extends = heltec_v4_r8_oled
build_flags =
  ${heltec_v4_r8_oled.build_flags}
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=1
build_src_filter = ${heltec_v4_r8_oled.build_src_filter}
  +<../examples/simple_secure_chat/main.cpp>
lib_deps =
  ${heltec_v4_r8_oled.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:heltec_v4_r8_companion_radio_usb]
extends = heltec_v4_r8_oled
build_flags =
  ${heltec_v4_r8_oled.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D DISPLAY_CLASS=SSD1306Display
build_src_filter = ${heltec_v4_r8_oled.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${heltec_v4_r8_oled.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:heltec_v4_r8_companion_radio_ble]
extends = heltec_v4_r8_oled
build_flags =
  ${heltec_v4_r8_oled.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D DISPLAY_CLASS=SSD1306Display
  -D BLE_PIN_CODE=123456
  -D AUTO_SHUTDOWN_MILLIVOLTS=3400
  -D BLE_DEBUG_LOGGING=1
  -D OFFLINE_QUEUE_SIZE=256
build_src_filter = ${heltec_v4_r8_oled.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<helpers/esp32/*.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${heltec_v4_r8_oled.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:heltec_v4_r8_companion_radio_wifi]
extends = heltec_v4_r8_oled
build_flags =
  ${heltec_v4_r8_oled.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
  -D DISPLAY_CLASS=SSD1306Display
  -D WIFI_DEBUG_LOGGING=1
  -D WIFI_SSID='"myssid"'
  -D WIFI_PWD='"mypwd"'
build_src_filter = ${heltec_v4_r8_oled.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<helpers/esp32/*.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${heltec_v4_r8_oled.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:heltec_v4_r8_sensor]
extends = heltec_v4_r8_oled
build_flags =
  ${heltec_v4_r8_oled.build_flags}
  -D ADVERT_NAME='"Heltec R8 Sensor"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D DISPLAY_CLASS=SSD1306Display
build_src_filter = ${heltec_v4_r8_oled.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<../examples/simple_sensor>
lib_deps =
  ${heltec_v4_r8_oled.lib_deps}
  ${esp32_ota.lib_deps}

