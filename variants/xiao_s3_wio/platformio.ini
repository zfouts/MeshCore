; ---- combined_node: companion + relay + extended telemetry/bot commands ----
; Reuses the unmodified companion_radio sources and adds the bot/relay/telemetry
; extension in examples/combined_node (enabled via -D WITH_*). ESP32-S3.
[env:Xiao_S3_WIO_combined_node_usb]
extends = Xiao_S3_WIO
upload_speed = 115200
upload_flags = --no-stub
build_flags =
  ${Xiao_S3_WIO.build_flags}
  -I examples/combined_node/ui-new
  -I examples/combined_node
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D DISPLAY_CLASS=SSD1306Display
  -D OFFLINE_QUEUE_SIZE=256
  -D WITH_BOT_COMMANDS=1
  -D WITH_RELAY_POLICY=1
  -D WITH_COMBINED_EXTRAS=1
  -include examples/combined_node/CombinedRepeatFreq.h
  -D ADVERT_NAME='"Xiao Combined"'
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${Xiao_S3_WIO.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/esp32/*.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/combined_node/*.cpp>
  +<../examples/combined_node/ui-new/*.cpp>
lib_deps =
  ${Xiao_S3_WIO.lib_deps}
  densaugeo/base64 @ ~1.4.0
  adafruit/Adafruit SSD1306 @ ^2.5.13

