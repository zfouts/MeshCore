; ---- combined_node SOLAR profile: low-battery deep-sleep + LPCOMP dawn wake ----
; For unattended solar-light deployments. Enables the runtime low-battery cutoff
; (off by default for always-powered/car use) so the node SYSTEMOFFs (~1-2uA) when
; the night drains the cell and self-wakes via the onboard LPCOMP voltage wake when
; the panel recharges it at dawn -- no extra wiring (sense + wake ride the XIAO's
; internal VBAT line on the BAT pads). Inherits the BLE build; only adds the solar
; deltas. THRESHOLDS BELOW ARE PROVISIONAL -- bench-test the cutoff/wake hysteresis
; with a current-limited supply before sealing any node into an enclosure.
[env:Xiao_nrf52_combined_node_solar]
extends = env:Xiao_nrf52_combined_node_ble
build_flags =
  ${env:Xiao_nrf52_combined_node_ble.build_flags}
  -D COMBINED_LOW_BATT_MV=3450        ; cutoff: above the 3300mV boot-lock, in the LPCOMP wake band
  -D COMBINED_ADVERT_INTERVAL_S=1800  ; advertise half as often (900->1800s) to save power
  -D COMBINED_LOWBATT_BEACON=1        ; broadcast a "going dark" msg on the bot channel before sleep

; ---- fleet_node: mesh-only relay + private control-room command surface ------
; nRF52840, no physical display on this XIAO board. The base env's
; DISPLAY_CLASS=NullDisplayDriver targets ui-orig (its own Button.cpp), which we
; dropped; build_unflags removes it so this env runs headless -- no UI, no ui srcs.
[env:Xiao_nrf52_fleet_node_ble]
extends = Xiao_nrf52
board_build.ldscript = boards/nrf52840_s140_v7_extrafs.ld
board_upload.maximum_size = 708608
build_flags =
  ${Xiao_nrf52.build_flags}
  -I examples/fleet_node
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D OFFLINE_QUEUE_SIZE=256
  -D QSPIFLASH=1
  -D WITH_BOT_COMMANDS=1
  -D WITH_RELAY_POLICY=1
  -D WITH_FLEET_EXTRAS=1
  -include examples/fleet_node/FleetRepeatFreq.h
  -D ADVERT_NAME='"Fleet Node"'
build_unflags = -D DISPLAY_CLASS=NullDisplayDriver
build_src_filter = ${Xiao_nrf52.build_src_filter}
  +<helpers/nrf52/SerialBLEInterface.cpp>
  +<../examples/fleet_node/*.cpp>
lib_deps =
  ${Xiao_nrf52.lib_deps}
  densaugeo/base64 @ ~1.4.0

