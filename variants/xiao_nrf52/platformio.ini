; ---- combined_node: companion + relay + extended telemetry/bot commands ----
; Reuses the unmodified companion_radio sources and adds the bot/relay/telemetry
; extension in examples/combined_node. nRF52840: ESP32 watchdog is replaced by
; the nRF52 hardware WDT (see CombinedNode.cpp). Uses ui-orig like the nRF
; companion build.
[env:Xiao_nrf52_combined_node_ble]
extends = Xiao_nrf52
board_build.ldscript = boards/nrf52840_s140_v7_extrafs.ld
board_upload.maximum_size = 708608
build_flags =
  ${Xiao_nrf52.build_flags}
  -I examples/combined_node/ui-orig
  -I examples/combined_node
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D OFFLINE_QUEUE_SIZE=256
  -D QSPIFLASH=1
  -D WITH_BOT_COMMANDS=1
  -D WITH_RELAY_POLICY=1
  -D WITH_COMBINED_EXTRAS=1
  -include examples/combined_node/CombinedRepeatFreq.h
  -D ADVERT_NAME='"Xiao Combined"'
;  -D MESH_DEBUG=1
build_src_filter = ${Xiao_nrf52.build_src_filter}
  +<helpers/nrf52/SerialBLEInterface.cpp>
  +<../examples/combined_node/*.cpp>
  +<../examples/combined_node/ui-orig/*.cpp>
lib_deps =
  ${Xiao_nrf52.lib_deps}
  densaugeo/base64 @ ~1.4.0

