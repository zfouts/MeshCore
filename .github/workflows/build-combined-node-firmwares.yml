name: Build Combined Node Firmwares

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'combined-node-*'

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: Clone Repo
        uses: actions/checkout@v6

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build Firmwares
        env:
          FIRMWARE_VERSION: ${{ env.GIT_TAG_VERSION }}
        run: /usr/bin/env bash build.sh build-combined-node-firmwares

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: combined-node-firmwares
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Combined Node Firmware ${{ env.GIT_TAG_VERSION }}
          body: ""
          draft: true
          files: out/*
