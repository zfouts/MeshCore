name: Build Observer Firmwares

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'observer-*'

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: Clone Repo
        uses: actions/checkout@v6

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build Firmwares
        env:
          # tag observer-v1.16.0 -> GIT_TAG_VERSION=v1.16.0 -> reported/filename
          # version v1.16.0-observer-<sha> (build.sh appends the commit hash).
          FIRMWARE_VERSION: ${{ env.GIT_TAG_VERSION }}-observer
        run: /usr/bin/env bash build.sh build-observer-firmwares

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: observer-firmwares
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Observer Firmware ${{ env.GIT_TAG_VERSION }}
          body: ""
          draft: false
          files: out/*
